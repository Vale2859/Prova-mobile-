<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operatore | Farmacia Montesano</title>

<script src="punti.js"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f7f5;
}

/* BLOCCO OPERATORE */
.lock-screen{
  position:fixed;
  inset:0;
  background:#0d7a5f;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.lock-box{
  background:#fff;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:400px;
}

.lock-box input{
  width:100%;
  padding:15px;
  font-size:18px;
  margin-top:20px;
}

/* LAYOUT */
.container{
  display:flex;
  height:100vh;
}

.left, .right{
  flex:1;
  padding:40px;
}

.left{
  background:#ffffff;
}

.right{
  background:#f9fbfa;
}

.section{
  background:#fff;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

h2{
  margin-top:0;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:10px;
}

button{
  width:100%;
  padding:18px;
  font-size:18px;
  background:#0d7a5f;
  color:#fff;
  border:none;
  border-radius:12px;
  margin-top:20px;
  cursor:pointer;
}

.summary{
  font-size:22px;
  font-weight:bold;
  margin-top:20px;
}

.client-info{
  font-size:18px;
}
</style>
</head>

<body>

<!-- BLOCCO BADGE OPERATORE -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <h2>Scansiona badge operatore</h2>
    <input type="text" id="operatorBadge" placeholder="Badge operatore">
  </div>
</div>

<div class="container">

  <!-- SINISTRA -->
  <div class="left">

    <div class="section">
      <h2>Cliente</h2>
      <input type="text" id="clientCode" placeholder="Codice cliente">

      <div class="client-info" id="clientInfo">
        Nessun cliente selezionato
      </div>
    </div>

    <div class="section">
      <h2>Importo acquisto (€)</h2>
      <input type="number" id="importo" placeholder="0.00" oninput="calcola()">
      <div class="summary" id="puntiAcquisto">0 punti</div>
    </div>

  </div>

  <!-- DESTRA -->
  <div class="right">

    <div class="section">
      <h2>Punti extra</h2>
      <input type="number" id="puntiExtra" placeholder="0" oninput="calcola()">
      <input type="text" id="descrizioneExtra" placeholder="Motivo (es. bonus maggio)">
    </div>

    <div class="section">
      <h2>Totale punti</h2>
      <div class="summary" id="totalePunti">0</div>
      <button onclick="conferma()">Conferma accredito</button>
    </div>

  </div>

</div>

<script>

// ===================
// DATABASE DEMO OPERATORI
// ===================
const operatori = [
  {badge:"OP001", nome:"Mario"},
  {badge:"OP002", nome:"Anna"}
];

// ===================
// SBLOCCO OPERATORE
// ===================
document.getElementById("operatorBadge").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    const badge = this.value.trim();

    const operatore = operatori.find(o => o.badge === badge);

    if(operatore){
      window.operatoreAttivo = operatore;
      document.getElementById("lockScreen").style.display="none";
      this.value="";
    } else {
      alert("Operatore non riconosciuto");
    }
  }
});

// ===================
// CLIENTE
// ===================
let clienteAttivo = null;

document.getElementById("clientCode").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    const code = this.value.trim();

    let profile = JSON.parse(localStorage.getItem("farmaciaProfileData"));

    if(profile && (profile.clientId === code || profile.clientCode === code)){
      clienteAttivo = profile;
      document.getElementById("clientInfo").innerHTML =
        `${profile.name} ${profile.surname}<br>Punti: ${profile.points}`;
    } else {
      alert("Cliente non trovato");
    }
  }
});

// ===================
// CALCOLO
// ===================
function calcola(){
  const importo = Number(document.getElementById("importo").value || 0);
  const extra = Number(document.getElementById("puntiExtra").value || 0);

  const punti = Math.floor(importo / 0.5);

  document.getElementById("puntiAcquisto").innerText = punti + " punti";
  document.getElementById("totalePunti").innerText = punti + extra;
}

// ===================
// CONFERMA
// ===================
function conferma(){

  if(!clienteAttivo){
    alert("Seleziona cliente");
    return;
  }

  if(!window.operatoreAttivo){
    alert("Operatore non autenticato");
    return;
  }

  const importo = Number(document.getElementById("importo").value || 0);
  const extra = Number(document.getElementById("puntiExtra").value || 0);

  const punti = Math.floor(importo / 0.5);
  const totale = punti + extra;

  if(totale <= 0){
    alert("Inserisci un valore valido");
    return;
  }

  // aggiorna punti
  aggiungiAcquisto(importo, "Acquisto farmacia");

  if(extra > 0){
    aggiungiAcquisto(extra * 0.5, "Bonus: " + document.getElementById("descrizioneExtra").value);
  }

  // LOG OPERATORE
  let log = JSON.parse(localStorage.getItem("farmaciaOperatorLog")) || [];

  log.unshift({
    operatore: window.operatoreAttivo.nome,
    badge: window.operatoreAttivo.badge,
    cliente: clienteAttivo.clientId,
    punti: totale,
    data: new Date().toLocaleString()
  });

  localStorage.setItem("farmaciaOperatorLog", JSON.stringify(log));

  alert("Punti caricati!");

  reset();
}

// ===================
// RESET
// ===================
function reset(){
  document.getElementById("importo").value="";
  document.getElementById("puntiExtra").value="";
  document.getElementById("descrizioneExtra").value="";
  document.getElementById("clientCode").value="";
  document.getElementById("clientInfo").innerHTML="Nessun cliente selezionato";
  document.getElementById("puntiAcquisto").innerText="0 punti";
  document.getElementById("totalePunti").innerText="0";

  clienteAttivo = null;

  // riblocca
  document.getElementById("lockScreen").style.display="flex";
}

</script>

</body>
</html>
